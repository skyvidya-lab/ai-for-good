# Dynamis Terra — Knowledge Base Index
# Machine-readable registry for KB domains (pattern from AgentSpec v3.0.0)

version: "1.1.0"
project: "Dynamis Terra"
challenge: "ITU AI and Space Computing Challenge 2026 — Track 1 Final Round"
last_updated: "2026-04-17"
changelog:
  - "1.1.0 (2026-04-17): +pyro, +kalman-bayesian, +markov-chain domains"
  - "1.0.0 (2026-04-17): initial registry (dynamis, sentinel2, crop-science, challenge)"

# File size limits (single source of truth)
limits:
  quick_reference: 100
  concept: 150
  pattern: 200
  spec: null
  reference: null

# Templates available for new KB content
templates:
  - name: concept
    path: _templates/concept.md.template
  - name: pattern
    path: _templates/pattern.md.template
  - name: index
    path: _templates/index.md.template
  - name: quick-reference
    path: _templates/quick-reference.md.template
  - name: spec
    path: _templates/spec.yaml.template
  - name: domain-manifest
    path: _templates/domain-manifest.yaml.template
  - name: test-case
    path: _templates/test-case.json.template

# Domain registry — 4 domains tailored to this challenge
domains:
  dynamis:
    status: "active"
    entry_point: dynamis/index.md
    quick_reference: dynamis/quick-reference.md
    description: "Physics-informed modules: MKM, Hurst, Innovation Loss, ChaosAttention."
    concepts:
      - dynamis/concepts/markov-kalman-module.md
      - dynamis/concepts/hurst-exponent.md
      - dynamis/concepts/innovation-loss.md
      - dynamis/concepts/chaos-attention.md
    patterns:
      - dynamis/patterns/phenology-transition-prior.md
      - dynamis/patterns/agriculture-domain-mapping.md
      - dynamis/patterns/physics-vector-injection.md
    source_code:
      - src/dynamis/dynamis_core.py
      - src/dynamis/phenology_prior.py
      - src/dynamis/hurst_geo.py
      - src/dynamis/chaos_attention.py
      - src/dynamis/innovation_loss.py
      - src/models/dynamis_crop_classifier.py
    agents:
      - ai-ml/dynamis-geo-architect
    parent_theory:
      citation: "Wang et al. 2025 — Hierarchical Reasoning Model"
      arxiv: "https://arxiv.org/abs/2506.21734"
      local_copy: "background/../skyvidya_dynamis/dynamis-teoria/2506.21734v1.pdf"

  sentinel2:
    status: "active"
    entry_point: sentinel2/index.md
    description: "Sentinel-2 L2A bands, vegetation indices, pipeline conventions."
    concepts:
      - sentinel2/concepts/bands.md
      - sentinel2/concepts/vegetation-indices.md
    patterns: []
    source_code:
      - src/data/sentinel2_loader.py
      - src/data/folder_consolidator.py
      - src/data/point_extractor.py
      - src/data/vegetation_indices.py
      - src/data/temporal_builder.py
      - src/data/sample_strategy.py
      - src/data/phenology_features.py
    agents:
      - ai-ml/satellite-data-engineer

  crop-science:
    status: "active"
    entry_point: crop-science/index.md
    description: "Agronomic knowledge: phenophases, crop signatures (rice/corn/soybean NE China)."
    concepts:
      - crop-science/concepts/phenophases.md
      - crop-science/concepts/crop-signatures.md
    patterns: []
    agents:
      - domain/crop-classifier

  challenge:
    status: "active"
    entry_point: challenge/index.md
    description: "Challenge task description, dataset anatomy, submission format."
    concepts: []
    patterns: []
    docs:
      - challenge/task-description.md
      - challenge/dataset-anatomy.md
      - challenge/submission-format.md
    agents:
      - domain/submission-builder

  pyro:
    status: "reference"
    entry_point: pyro/index.md
    quick_reference: pyro/quick-reference.md
    description: "Universal probabilistic programming — Pyro (PyTorch) and NumPyro (JAX). Candidate for v5+ Bayesian MKM."
    concepts:
      - pyro/concepts/pyro-vs-numpyro.md
      - pyro/concepts/core-primitives.md
      - pyro/concepts/inference-algorithms.md
    patterns:
      - pyro/patterns/svi-elbo.md
      - pyro/patterns/mcmc-nuts.md
      - pyro/patterns/probabilistic-dynamis-model.md
    external:
      - "https://pyro.ai/"
      - "https://github.com/pyro-ppl/pyro"
      - "https://github.com/pyro-ppl/numpyro"
    license: Apache-2.0

  kalman-bayesian:
    status: "reference"
    entry_point: kalman-bayesian/index.md
    quick_reference: kalman-bayesian/quick-reference.md
    description: "Foundational KF theory (Labbe book). Canon for our MKM implementation."
    concepts:
      - kalman-bayesian/concepts/kalman-basics.md
      - kalman-bayesian/concepts/innovation-and-gain.md
      - kalman-bayesian/concepts/designing-q-r.md
      - kalman-bayesian/concepts/multivariate-state-space.md
    patterns:
      - kalman-bayesian/patterns/linear-kalman-filter.md
      - kalman-bayesian/patterns/learnable-kalman-pytorch.md
    external:
      - "https://rlabbe.github.io/Kalman-and-Bayesian-Filters-in-Python/"
      - "https://github.com/rlabbe/Kalman-and-Bayesian-Filters-in-Python"
    license: CC-BY-4.0 (book), MIT (code)

  markov-chain:
    status: "reference"
    entry_point: markov-chain/index.md
    quick_reference: markov-chain/quick-reference.md
    description: "Discrete-state Markov chain theory. Underpins our phenology transition prior."
    concepts:
      - markov-chain/concepts/markov-chain-basics.md
      - markov-chain/concepts/transition-matrix.md
      - markov-chain/concepts/stationary-distribution.md
    patterns:
      - markov-chain/patterns/pgmpy-markovchain.md
      - markov-chain/patterns/numpy-transition-matrix.md
    external:
      - "https://github.com/pgmpy/pgmpy"
      - "https://pgmpy.org/models/markovchain.html"
      - "https://www.math.ku.dk/bibliotek/arkivet/noter/stoknoter.pdf"
    license: MIT (pgmpy)

# Cross-domain shared resources (none yet, reserved for future)
shared: {}

# MCP validation tracking (populate as domains are validated against external docs)
validation:
  pyro:
    last_checked: "2026-04-17"
    source: "WebFetch of pyro.ai landing + numpyro github README"
  kalman-bayesian:
    last_checked: "2026-04-17"
    source: "WebFetch of Labbe book online HTML version"
  markov-chain:
    last_checked: "2026-04-17"
    source: "WebFetch of pgmpy.org MarkovChain docs + github README"
